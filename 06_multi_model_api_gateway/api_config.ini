# 06_multi_model_api_gateway — 多模型 API 配置文件
# 支持通过环境变量或本文件配置 API Key
# 优先级: 环境变量 > 本文件

[deepseek]
api_key = ${CAREERAI_API_KEY_DEEPSEEK}
base_url = https://api.deepseek.com/v1
model_lite = deepseek-chat
model_enhanced = deepseek-reasoner
max_tokens_lite = 4096
max_tokens_enhanced = 4096
context_window_lite = 32000
context_window_enhanced = 128000
cost_in_lite = 0.00014
cost_out_lite = 0.00028
cost_in_enhanced = 0.00055
cost_out_enhanced = 1.10

[doubao]
api_key = ${CAREERAI_API_KEY_DOUBAO}
base_url = https://ark.cn-beijing.volces.com/api/v3
model = doubao-pro-32k
max_tokens = 4096
context_window = 32000
cost_in = 0.0008
cost_out = 0.002

[gpt]
api_key = ${CAREERAI_API_KEY_CHATGPT}
base_url = https://api.openai.com/v1
model = gpt-4o
max_tokens = 4096
context_window = 128000
cost_in = 0.0025
cost_out = 0.01

[claude]
api_key = ${CAREERAI_API_KEY_CLAUDE}
base_url = https://api.anthropic.com/v1
model = claude-sonnet-4-6-20250514
max_tokens = 4096
context_window = 200000
cost_in = 0.003
cost_out = 0.015

[gemini]
api_key = ${CAREERAI_API_KEY_GEMINI}
base_url = https://generativelanguage.googleapis.com/v1beta
model = gemini-2.5-flash
max_tokens = 2048
context_window = 1000000
cost_in = 0.00015
cost_out = 0.0006

[gateway]
# 默认主模型
default_model = deepseek_lite
# 每分钟最大请求数
max_rpm = 30
# 最大重试次数
max_retries = 3
# 重试间隔(秒)
retry_delay = 1.0
# 余额告警阈值(美元)
balance_alert_threshold = 1.0
# 自动故障降级开关
enable_auto_fallback = true
