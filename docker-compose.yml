# CareerAI 一键部署配置
# 用法:
#   CPU 模式: docker compose up -d
#   GPU 模式: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: base  # 改为 'gpu' 以启用 GPU 加速
    container_name: careerai-backend
    ports:
      - "8000:8000"
    environment:
      # Server
      - CAREERAI_HOST=0.0.0.0
      - CAREERAI_PORT=8000
      - CAREERAI_DEBUG=false

      # GPU (设为 'cpu' 以强制使用 CPU)
      - CAREERAI_DEVICE=cpu

      # SmartResume (vLLM — GPU needed, set URL if remote)
      - SMARTRESUME_ENABLED=false
      # - SMARTRESUME_VLLM_URL=http://vllm:8100/v1

      # MinerU (GPU needed)
      - MINERU_ENABLED=false

      # Unstructured (CPU OK)
      - UNSTRUCTURED_ENABLED=true
      - UNSTRUCTURED_STRATEGY=hi_res

      # Docling (GPU recommended)
      - DOCLING_ENABLED=false

      # PaddleOCR (CPU OK, slower)
      - PADDLEOCR_ENABLED=true

      # LLM API Keys (从宿主机环境变量传入)
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

      # CORS
      - CORS_ORIGINS=*

      # Session
      - SESSION_TTL=1800

      # File limits
      - MAX_UPLOAD_SIZE_MB=20

      # Logging
      - LOG_LEVEL=INFO
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 可选: Redis 用于跨会话素材存储
  redis:
    image: redis:7-alpine
    container_name: careerai-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # 仅在 backend 需要 Redis 时启用
    profiles:
      - full

  # 可选: Nginx 反向代理 (生产环境)
  nginx:
    image: nginx:alpine
    container_name: careerai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../:/usr/share/nginx/html:ro
    depends_on:
      - backend
    profiles:
      - full

volumes:
  redis_data:
