# GPU 加速覆盖配置
# 用法: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

version: "3.9"

services:
  backend:
    build:
      target: gpu  # 使用 GPU 构建阶段
    environment:
      - CAREERAI_DEVICE=cuda
      - SMARTRESUME_ENABLED=true
      - MINERU_ENABLED=true
      - DOCLING_ENABLED=true
      - PADDLEOCR_ENABLED=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # 共享内存（vLLM 推理需要大共享内存）
    shm_size: "8gb"

  # vLLM 推理服务 (SmartResume)
  vllm:
    image: vllm/vllm-openai:latest
    container_name: careerai-vllm
    ports:
      - "8100:8000"
    environment:
      - HF_HOME=/models
      - VLLM_MODEL=Alibaba-EI/Qwen3-0.6B-resume
      - VLLM_MAX_MODEL_LEN=4096
      - VLLM_GPU_MEMORY_UTILIZATION=0.85
    volumes:
      - vllm_models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["--model", "Alibaba-EI/Qwen3-0.6B-resume", "--port", "8000"]
    restart: unless-stopped
    shm_size: "8gb"

volumes:
  vllm_models:
